<div class="admin-shell">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-label="Portal Admin">
        <rect width="28" height="28" rx="7" fill="#01696f" />
        <rect x="7" y="7" width="6" height="6" rx="1.5" fill="white" />
        <rect x="15" y="7" width="6" height="6" rx="1.5" fill="white" opacity=".6" />
        <rect x="7" y="15" width="6" height="6" rx="1.5" fill="white" opacity=".6" />
        <rect x="15" y="15" width="6" height="6" rx="1.5" fill="white" />
      </svg>
      <div>
        <strong>Portal Admin</strong>
        <small>Controle interno</small>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a routerLink="/admin/dashboard" routerLinkActive="active" class="nav-item">
        <svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <rect x="3" y="3" width="7" height="7" />
          <rect x="14" y="3" width="7" height="7" />
          <rect x="14" y="14" width="7" height="7" />
          <rect x="3" y="14" width="7" height="7" />
        </svg>
        Dashboard
      </a>
      <a routerLink="/admin/employees" routerLinkActive="active" class="nav-item">
        <svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
          <circle cx="9" cy="7" r="4" />
          <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
          <path d="M16 3.13a4 4 0 0 1 0 7.75" />
        </svg>
        Funcionários
      </a>

      <a routerLink="/admin/produtos" routerLinkActive="active" class="nav-item">
        <svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <rect x="2" y="3" width="20" height="14" rx="2" />
          <path d="M8 21h8M12 17v4" />
        </svg>
        Produtos
      </a>
      <a routerLink="/admin/notas-fiscais" routerLinkActive="active" class="nav-item">
        <svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
          <polyline points="14 2 14 8 20 8" />
          <line x1="16" y1="13" x2="8" y2="13" />
          <line x1="16" y1="17" x2="8" y2="17" />
          <polyline points="10 9 9 9 8 9" />
        </svg>
        Notas Fiscais
      </a>

      <a routerLink="/admin/notas-fiscais-historico" routerLinkActive="active" class="nav-item">
        <svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <circle cx="12" cy="12" r="9" />
          <polyline points="12 7 12 12 15 15" />
        </svg>
        Histórico de Notas
      </a>
    </nav>

    <div class="sidebar-footer">
      <button type="button" class="nav-item nav-item--logout" (click)="logout()">
        <svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
        Sair
      </button>
    </div>
  </aside>

  <div class="main-area">
    <header class="topbar">
      <div>
        <p class="topbar-kicker">Bem-vindo de volta</p>
        <h1>Painel Administrativo</h1>
      </div>
      <div class="topbar-user">
        <span class="avatar">LF</span>
        <div>
          <strong>Lucas</strong>
          <small>Administrador</small>
        </div>
      </div>
    </header>

    <router-outlet />
  </div>
</div>

<app-toast />
